<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سایت خفن من</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            max-width: 800px;
            background: rgba(255,255,255,0.05);
            padding: 40px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub {
            font-size: 1.3rem;
            color: #aaa;
            margin: 20px 0;
            border-bottom: 2px dashed #f5576c;
            padding-bottom: 15px;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }
        .card {
            background: #1e1e2f;
            padding: 20px 10px;
            border-radius: 15px;
            border-left: 4px solid #4facfe;
        }
        .card:nth-child(2) { border-left-color: #f093fb; }
        .card:nth-child(3) { border-left-color: #f5576c; }
        .card h3 { margin: 10px 0; }
        .card p { color: #aaa; font-size: 0.9rem; }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #f5576c, #4facfe);
            padding: 12px 35px;
            border-radius: 50px;
            color: #fff;
            font-weight: bold;
            text-decoration: none;
            margin-top: 15px;
        }
        .footer { margin-top: 30px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>
<div class="box">
    <h1>TechTaste</h1>
    <div class="sub">⚡ از کد تا قابلمه ⚡</div>
    <div class="cards">
        <div class="card">
            <h2>💻</h2>
            <h3>فناوری</h3>
            <p>آموزش برنامه‌نویسی</p>
        </div>
        <div class="card">
            <h2>📚</h2>
            <h3>درسی</h3>
            <p>فلش‌کارت و خلاصه</p>
        </div>
        <div class="card">
            <h2>🍳</h2>
            <h3>آشپزی</h3>
            <p>دستور پخت علمی</p>
        </div>
    </div>
    <a href="#" class="btn">به زودی...</a>
    <div class="footer">ساخته شده با ❤️</div>
</div>
</body>
</html>
